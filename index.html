<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff8fb8">
  <title>Mew Master Set · Collection Tracker</title>
  <meta name="description" content="A pretty, minimalist tracker for the complete English Pokémon TCG Mew master set.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='%23ff8fb8'/><circle cx='50' cy='50' r='12' fill='white'/></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="ball" aria-hidden="true"></div>
      <h1>Mew Master Set</h1>
      <p class="subtitle">Every English Mew card · cheapest to priciest · raw near-mint</p>
    </header>

    <section class="stats" aria-label="Progress">
      <div class="stat-row">
        <div class="count" id="count">0<small> / 0 cards</small></div>
        <div class="value" id="value"></div>
      </div>
      <div class="bar"><span id="bar-fill"></span></div>
      <div class="pct" id="pct">0% complete</div>
    </section>

    <section class="controls">
      <input id="search" class="search" type="search" placeholder="Search set, card, year…" autocomplete="off">
      <div class="chips" role="group" aria-label="Tier">
        <button class="chip" data-tier="all">All</button>
        <button class="chip" data-tier="1">Bulk</button>
        <button class="chip" data-tier="2">Mid</button>
        <button class="chip" data-tier="3">Grail</button>
      </div>
      <div class="chips" role="group" aria-label="Owned">
        <button class="chip" data-show="all">All</button>
        <button class="chip" data-show="owned">Have</button>
        <button class="chip" data-show="unowned">Need</button>
      </div>
      <select id="sort" class="sort" aria-label="Sort">
        <option value="asc">$ low → high</option>
        <option value="desc">$ high → low</option>
      </select>
    </section>

    <main id="list" class="list"></main>

    <footer>
      Checkmarks save automatically in this browser.
      &nbsp;·&nbsp; <span class="reset" id="reset">Reset all</span><br>
      Prices are raw / ungraded near-mint snapshots (2026-06-25) — re-check before buying grails.
    </footer>
  </div>

  <div id="lightbox" class="lightbox" hidden>
    <img id="lightbox-img" alt="">
    <div id="lightbox-cap" class="cap"></div>
  </div>

  <script src="cards.js"></script>
  <script src="app.js"></script>
</body>
</html>
